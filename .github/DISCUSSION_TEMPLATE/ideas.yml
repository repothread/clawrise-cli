title: "[Idea] "
labels:
  - idea
body:
  - type: markdown
    attributes:
      value: |
        Use Ideas for proposals that need early discussion before turning into a tracked issue or pull request.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or workflow problem are you trying to solve?
      placeholder: A missing capability makes this automation path difficult because ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Describe the rough solution, command shape, or integration path.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits, and why does this matter now?
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs or open questions
      description: Call out risks, alternatives, or design unknowns.
    validations:
      required: false
