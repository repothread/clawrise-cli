name: Release NPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 1.2.3; used for manual republishing'
        required: false
        type: string
      npm_scope:
        description: 'npm scope, for example @clawrise; required for official releases'
        required: false
        type: string
      npm_package_prefix:
        description: 'npm root package prefix; defaults to clawrise-cli'
        required: false
        type: string
      npm_dist_tag:
        description: 'npm dist-tag, for example latest, next, or beta; inferred automatically when empty'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name || github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Build And Publish NPM
    runs-on: ubuntu-latest
    environment: cicd
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify trusted publishing toolchain
        run: |
          node --version
          npm --version

      - name: Resolve release version
        id: version
        run: |
          version="$(./scripts/release/resolve-version.sh "${{ github.event.inputs.version || '' }}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${version}"

      - name: Verify release commit ancestry
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release workflow must run from a commit that belongs to origin/main history." >&2
            exit 1
          fi

      - name: Resolve npm publish config
        id: npm
        run: |
          npm_scope="${{ github.event.inputs.npm_scope || vars.CLAWRISE_NPM_SCOPE }}"
          if [[ -z "${npm_scope}" ]]; then
            echo "Official releases must configure an npm scope. Provide it through the workflow_dispatch input or the cicd environment variable CLAWRISE_NPM_SCOPE." >&2
            exit 1
          fi
          npm_package_prefix="${{ github.event.inputs.npm_package_prefix || vars.CLAWRISE_NPM_PACKAGE_PREFIX }}"
          if [[ -z "${npm_package_prefix}" ]]; then
            npm_package_prefix="clawrise-cli"
          fi
          npm_dist_tag="${{ github.event.inputs.npm_dist_tag || vars.CLAWRISE_NPM_DIST_TAG }}"
          if [[ -z "${npm_dist_tag}" ]]; then
            if [[ "${{ steps.version.outputs.version }}" == *-* ]]; then
              npm_dist_tag="next"
            else
              npm_dist_tag="latest"
            fi
          fi
          echo "scope=${npm_scope}" >> "$GITHUB_OUTPUT"
          echo "package_prefix=${npm_package_prefix}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${npm_dist_tag}" >> "$GITHUB_OUTPUT"
          echo "npm scope: ${npm_scope:-<none>}"
          echo "npm package prefix: ${npm_package_prefix}"
          echo "npm dist-tag: ${npm_dist_tag}"

      - name: Run unit tests
        run: go test ./...

      - name: Build release bundles
        run: ./scripts/release/build-npm-bundles.sh "${{ steps.version.outputs.version }}"

      - name: Prepare npm packages
        env:
          CLAWRISE_NPM_SCOPE: ${{ steps.npm.outputs.scope }}
          CLAWRISE_NPM_PACKAGE_PREFIX: ${{ steps.npm.outputs.package_prefix }}
          CLAWRISE_NPM_DIST_TAG: ${{ steps.npm.outputs.dist_tag }}
        run: node ./scripts/release/prepare-npm-packages.mjs "${{ steps.version.outputs.version }}"

      - name: Verify npm runtime wiring
        run: node ./scripts/release/verify-npm-runtime.mjs

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: clawrise-cli-release-${{ steps.version.outputs.version }}
          path: |
            dist/release/archives/*.tar.gz
            dist/release/archives/SHA256SUMS

      - name: Generate release notes
        env:
          CLAWRISE_GITHUB_REPOSITORY: ${{ github.repository }}
          CLAWRISE_RELEASE_GIT_SHA: ${{ github.sha }}
        run: ./scripts/release/generate-release-notes.sh "${{ steps.version.outputs.version }}"

      - name: Verify release artifacts
        env:
          CLAWRISE_NPM_DIST_TAG: ${{ steps.npm.outputs.dist_tag }}
        run: node ./scripts/release/verify-release-artifacts.mjs "${{ steps.version.outputs.version }}"

      - name: Publish GitHub release
        run: |
          tag="v${{ steps.version.outputs.version }}"
          title="Clawrise CLI v${{ steps.version.outputs.version }}"
          notes_path="dist/release/release-notes.md"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" --title "${title}" --notes-file "${notes_path}"
          else
            if [[ "${{ steps.version.outputs.version }}" == *-* ]]; then
              gh release create "${tag}" --title "${title}" --notes-file "${notes_path}" --prerelease
            else
              gh release create "${tag}" --title "${title}" --notes-file "${notes_path}"
            fi
          fi
          gh release upload "${tag}" dist/release/archives/*.tar.gz dist/release/archives/SHA256SUMS --clobber

      - name: Publish npm packages
        env:
          CLAWRISE_NPM_DIST_TAG: ${{ steps.npm.outputs.dist_tag }}
        run: ./scripts/release/publish-npm.sh "${{ steps.version.outputs.version }}"
