defaults:
  platform: feishu
  account: feishu_bot
  platform_accounts:
    feishu: feishu_bot
    notion: notion_bot

auth:
  secret_store:
    backend: encrypted_file
  session_store:
    backend: file

runtime:
  retry:
    max_attempts: 1
    base_delay_ms: 200
    max_delay_ms: 1000
  # Local policy rules can run without any external plugin.
  # Uncomment the plugin selector block when a policy plugin is available in discovery roots.
  policy:
    mode: auto
    require_approval_operations:
      - feishu.calendar.event.delete
    annotate_operations:
      notion.page.update: "Set input.change_reason when updating shared knowledge content."
    # plugins:
    #   - plugin: sample-policy
    #     policy_id: require_reason_for_mutations
  # Audit sinks can mix builtin sinks and plugin sinks.
  audit:
    mode: manual
    sinks:
      - type: stdout
      # - type: webhook
      #   url: env:CLAWRISE_AUDIT_WEBHOOK_URL
      #   headers:
      #     Authorization: env:CLAWRISE_AUDIT_WEBHOOK_TOKEN
      #   timeout_ms: 3000
      # - type: plugin
      #   plugin: sample-audit
      #   sink_id: file_capture

accounts:
  feishu_bot:
    title: Feishu Bot
    platform: feishu
    subject: bot
    auth:
      method: feishu.app_credentials
      public:
        app_id: cli_xxx
      secret_refs:
        app_secret: secret:feishu_bot:app_secret

  feishu_user_alice:
    title: Feishu Alice User
    platform: feishu
    subject: user
    auth:
      method: feishu.oauth_user
      public:
        client_id: cli_xxx
        redirect_mode: loopback
        scopes:
          - offline_access
      secret_refs:
        client_secret: secret:feishu_user_alice:client_secret
        refresh_token: secret:feishu_user_alice:refresh_token

  notion_bot:
    title: Notion Bot
    platform: notion
    subject: integration
    auth:
      method: notion.internal_token
      public:
        notion_version: "2026-03-11"
      secret_refs:
        token: secret:notion_bot:token

  notion_public_workspace_a:
    title: Notion Public OAuth Workspace A
    platform: notion
    subject: integration
    auth:
      method: notion.oauth_public
      public:
        client_id: cli_xxx
        notion_version: "2026-03-11"
        redirect_mode: loopback
      secret_refs:
        client_secret: secret:notion_public_workspace_a:client_secret
        refresh_token: secret:notion_public_workspace_a:refresh_token
