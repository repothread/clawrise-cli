defaults:
  platform: feishu
  account: feishu_bot_ops
  platform_accounts:
    feishu: feishu_bot_ops
    notion: notion_team_docs

auth:
  secret_store:
    backend: auto
    fallback_backend: encrypted_file
  session_store:
    backend: file

runtime:
  retry:
    max_attempts: 1
    base_delay_ms: 200
    max_delay_ms: 1000

accounts:
  feishu_bot_ops:
    title: 飞书运营 Bot
    platform: feishu
    subject: bot
    auth:
      method: feishu.app_credentials
      public:
        app_id: cli_xxx
      secret_refs:
        app_secret: secret:feishu_bot_ops:app_secret

  feishu_user_alice:
    title: 飞书 Alice 用户态
    platform: feishu
    subject: user
    auth:
      method: feishu.oauth_user
      public:
        client_id: cli_xxx
        redirect_mode: loopback
        scopes:
          - offline_access
      secret_refs:
        client_secret: secret:feishu_user_alice:client_secret
        refresh_token: secret:feishu_user_alice:refresh_token

  notion_team_docs:
    title: Notion 团队文档
    platform: notion
    subject: integration
    auth:
      method: notion.internal_token
      public:
        notion_version: "2026-03-11"
      secret_refs:
        token: secret:notion_team_docs:token

  notion_public_workspace_a:
    title: Notion 公共 OAuth 工作区 A
    platform: notion
    subject: integration
    auth:
      method: notion.oauth_public
      public:
        client_id: cli_xxx
        notion_version: "2026-03-11"
        redirect_mode: loopback
      secret_refs:
        client_secret: secret:notion_public_workspace_a:client_secret
        refresh_token: secret:notion_public_workspace_a:refresh_token
