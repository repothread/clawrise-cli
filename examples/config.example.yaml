defaults:
  platform: feishu
  connections:
    feishu: feishu_bot_ops
    notion: notion_team_docs

auth:
  secret_store:
    backend: auto
    fallback_backend: encrypted_file
  session_store:
    backend: file

runtime:
  retry:
    max_attempts: 1
    base_delay_ms: 200
    max_delay_ms: 1000

connections:
  feishu_bot_ops:
    title: 飞书运营 Bot
    platform: feishu
    subject: bot
    method: feishu.app_credentials
    params:
      app_id: cli_xxx

  feishu_user_alice:
    title: 飞书 Alice 用户态
    platform: feishu
    subject: user
    method: feishu.oauth_user
    params:
      client_id: cli_xxx
      redirect_mode: loopback
      scopes:
        - offline_access

  notion_team_docs:
    title: Notion 团队文档
    platform: notion
    subject: integration
    method: notion.internal_token
    params:
      notion_version: "2026-03-11"

  notion_public_workspace_a:
    title: Notion 公共 OAuth 工作区 A
    platform: notion
    subject: integration
    method: notion.oauth_public
    params:
      client_id: cli_xxx
      notion_version: "2026-03-11"
      redirect_mode: loopback
